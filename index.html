<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Time Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    .result {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>💸 Work Time Converter</h2><input id="salary" type="number" placeholder="monthly income (Rp)" />
<input id="days" type="number" placeholder="working days" />
<input id="price" type="number" placeholder="price of goods (Rp)" />

<button onclick="calculate()">Hitung</button>

<div class="result" id="result"></div>

  </div>  <script>
    function calculate() {
      const salary = parseFloat(document.getElementById('salary').value);
      const days = parseFloat(document.getElementById('days').value);
      const price = parseFloat(document.getElementById('price').value);

      if (!salary || !days || !price) {
        document.getElementById('result').innerText = 'isi semua dulu lah';
        return;
      }

      const perDay = salary / days;
      const dayNeeded = price / perDay;
      const hours = dayNeeded * 24;
      const h = Math.floor(hours);
      const m = Math.round((hours - h) * 60);

      document.getElementById('result').innerHTML = `
        🧾 daily income: Rp ${perDay.toLocaleString()}<br>
        ⏳ working time: ${h} jam ${m} minute<br>
        💀 equals to ${dayNeeded.toFixed(2)} working day
      `;
    }
  </script></body>
</html>
