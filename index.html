<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Time Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.4);
    }
    h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      transition: box-shadow 0.2s ease;
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #38bdf8;
    }
    .result {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
    .details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .details.show {
      max-height: 200px;
    }
    .toggle-btn {
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 12px;
    }
    .bar {
      height: 10px;
      background: #334155;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }
    .fill {
      height: 100%;
      background: #38bdf8;
      width: 0%;
      transition: width 0.5s ease, background 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>💸 Work-Time! Converter</h2><input id="salary" type="text" placeholder="monthly income (Rp)" oninput="handleInput(this)" />
<input id="days" type="number" placeholder="working days" oninput="calculate()" />
<input id="hoursPerDay" type="number" placeholder="working hours/day (ex: 9)" oninput="calculate()" />
<input id="price" type="text" placeholder="price of goods (Rp)" oninput="handleInput(this)" />

<div class="result" id="result"></div>

<button class="toggle-btn" onclick="toggleDetails()">Show Details</button>
<div class="details" id="details"></div>

<div class="bar"><div class="fill" id="barFill"></div></div>

  </div>  <script>
    function formatNumber(input) {
      let value = input.value.replace(/[^0-9]/g, '');
      input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function parseNumber(value) {
      return parseFloat(value.replace(/\./g, '')) || 0;
    }

    function handleInput(input) {
      formatNumber(input);
      calculate();
    }

    function toggleDetails() {
      const el = document.getElementById('details');
      el.classList.toggle('show');
    }

    function calculate() {
      const salary = parseNumber(document.getElementById('salary').value);
      const days = parseFloat(document.getElementById('days').value);
      const hoursPerDay = parseFloat(document.getElementById('hoursPerDay').value) || 9;
      const price = parseNumber(document.getElementById('price').value);

      localStorage.setItem('salary', document.getElementById('salary').value);
      localStorage.setItem('days', days);
      localStorage.setItem('hoursPerDay', hoursPerDay);
      localStorage.setItem('price', document.getElementById('price').value);

      if (!salary || !days || !price) {
        document.getElementById('result').innerText = '';
        document.getElementById('details').innerHTML = '';
        document.getElementById('barFill').style.width = '0%';
        return;
      }

      const perDay = salary / days;
      const perHour = perDay / hoursPerDay;
      const hours = price / perHour;

      const h = Math.floor(hours);
      const m = Math.round((hours - h) * 60);

      const percent = (price / salary) * 100;
      const warteg = Math.floor(price / 15000);

      const dayNeeded = price / perDay;
      const months = Math.floor(dayNeeded / days);
      const remainingDays = Math.round(dayNeeded % days);

      // main result (simple)
      document.getElementById('result').innerHTML = `
        ⏳ ${h} hour ${m} minute
      `;

      // detailed breakdown
      document.getElementById('details').innerHTML = `
        🧾 daily income: Rp ${perDay.toLocaleString('id-ID')}<br>
        💀 ${percent.toFixed(2)}% of your salary<br>
        🗓️ ${months} month ${remainingDays} working day
        setara ${warteg}x makan warteg<br>..
      `;

      const bar = document.getElementById('barFill');
      bar.style.width = percent + '%';

      if (percent < 5) bar.style.background = '#38bdf8';
      else if (percent < 15) bar.style.background = '#facc15';
      else bar.style.background = '#ef4444';
    }

    window.onload = function() {
      if (localStorage.getItem('salary')) {
        document.getElementById('salary').value = localStorage.getItem('salary');
        document.getElementById('days').value = localStorage.getItem('days');
        document.getElementById('hoursPerDay').value = localStorage.getItem('hoursPerDay');
        document.getElementById('price').value = localStorage.getItem('price');
        calculate();
      }
    }
  </script></body>
</html>
